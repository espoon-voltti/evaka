pre-commit:
  jobs:
    - group:
        parallel: true
        jobs:
          - &oxlint
            run: npx oxlint --fix {staged_files}
            glob: apigw/*.{ts,tsx,js,jsx,cjs,mjs}
            root: apigw
            stage_fixed: true
          - &oxfmt
            run: npx oxfmt -c ../.oxfmtrc.json --no-error-on-unmatched-pattern {staged_files}
            glob: apigw/*
            root: apigw
            stage_fixed: true

          - <<: *oxlint
            glob: frontend/*.{ts,tsx,js,jsx,cjs,mjs}
            root: frontend
          - <<: *oxfmt
            glob: frontend/*
            root: frontend

          - <<: *oxlint
            glob: dummy-idp/*.{ts,tsx,js,jsx,cjs,mjs}
            root: dummy-idp
          - <<: *oxfmt
            glob: dummy-idp/*
            root: dummy-idp

          - run: ./gradlew ktfmtPrecommit --include-only=$(echo {staged_files} | tr ' ' ',')
            glob: service/*.kt
            root: service
            stage_fixed: true
          - run: ./list-migrations.sh
            glob: service/src/main/resources/db/migration/*.sql
            root: service
            stage_fixed: true
    - run: ./bin/add-license-headers.sh {staged_files}
      stage_fixed: true
