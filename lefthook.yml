pre-commit:
  jobs:
    - group:
        parallel: true
        jobs:
          - run: yarn exec oxlint --fix {staged_files}
            glob: apigw/*.{ts,js}
            root: apigw
            stage_fixed: true
          - run: yarn exec oxfmt -c ../.oxfmtrc.json {staged_files}
            glob: apigw/*
            exclude: "*.license"
            root: apigw
            stage_fixed: true

          - run: yarn exec oxlint --fix {staged_files}
            glob: frontend/*.{ts,tsx,js,jsx,cjs,mjs}
            root: frontend
            stage_fixed: true
          - run: yarn exec oxfmt -c ../.oxfmtrc.json {staged_files}
            glob: frontend/*
            exclude: "*.license"
            root: frontend
            stage_fixed: true

          - run: npx oxlint --fix {staged_files}
            glob: dummy-idp/*.{ts,js}
            root: dummy-idp
            stage_fixed: true
          - run: npx oxfmt -c ../.oxfmtrc.json {staged_files}
            glob: dummy-idp/*
            exclude: "*.license"
            root: dummy-idp
            stage_fixed: true

          - run: ./gradlew ktfmtPrecommit --include-only=$(echo {staged_files} | tr ' ' ',')
            glob: service/*.kt
            root: service
            stage_fixed: true
          - run: ./list-migrations.sh
            glob: service/src/main/resources/db/migration/*.sql
            root: service
            stage_fixed: true
    - run: ./bin/add-license-headers.sh {staged_files}
      stage_fixed: true
