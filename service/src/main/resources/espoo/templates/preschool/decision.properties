decision.instructions=<p>Sovelletut oikeusohjeet:<br/> Perusopetuslaki 4, 5, 6 ja 26 a § ja perusopetusasetus 23 a §<br/> Kasvun ja oppimisen lautakunnan päätös 29.11.2023 § 187 esiopetuspaikan osoittamisperusteiden muuttamisesta.<br/>Kasvun ja oppimisen lautakunnan päätös 25.2.2026 § 43 tarkennuksista esiopetusta järjestäviin yksiköihin lukuvuonna 2026-2027.</p> <p> Päätöksessä ilmoitetun paikan <strong>vastaanottamis- tai kieltäytymisilmoitus on toimitettava välittömästi, viimeistään kahden viikon kuluessa</strong> tämän ilmoituksen saamisesta. Paikan voi käydä hyväksymässä/hylkäämässä sähköisesti osoitteessa <a href="https://espoonvarhaiskasvatus.fi" rel="noreferrer">espoonvarhaiskasvatus.fi</a> (vaatii tunnistautumisen) tai postitse.</p> <p>Tämä päätös poistaa lapsen esiopetushakemuksen.</p> <p>Toimivalta: Ratkaisuvallan delegointipäätös suomenkielisen varhaiskasvatuksen tulosyksikön sekä kasvun ja oppimisen toimialan esikunnan viranhaltijoille 6 § 2 kohta</p>
