decision.accepting=<p>Du ska omedelbart eller senast <strong>två veckor från mottagandet av detta beslut</strong>, ta emot eller avstå från platsen. Du kan ta emot eller avstå från platsen elektroniskt på adressen <a href="https://esbosmabarnspedagogik.fi" rel="noreferrer">esbosmabarnspedagogik.fi</a> (kräver identifiering) eller per post. </p> <p>Detta beslut upphäver barnets ansökan om förskoleplats.</p> <p>Behörighet: Beslutanderätt i enlighet med småbarnspedagogik- och utbildningslagstiftning för tjänstemän inom resultatenheten Svenska bildningstjänster och bildningssektorns stab 6 § punkt 6: Sakkunnig inom förvaltning och ledare inom småbarnspedagogik som direktören för Svenska bildningstjänster utsett beviljar förskoleplats i kommunalt daghem. </p>

decision.acceptance.title=ANMÄLAN OM MOTTAGANDE AV / AVSTÅENDE FRÅN FÖRSKOLEPLATS

decision.acceptance.child.name=Barnets namn
decision.acceptance.unit.name=Förskoleplats

decision.acceptance.instructions=<p><strong>Du ska ta emot eller avstå från den angivna förskoleplatsen omedelbart</strong>, senast två veckor efter att du har fått beslutet. Du kan ta emot eller avstå från platsen elektroniskt på adressen <a href="https://esbosmabarnspedagogik.fi" rel="noreferrer">esbosmabarnspedagogik.fi</a> (kräver identifiering) eller med att skicka denna sida ifylld till adressen ovan.</p> <p>Enligt 26 a § i lagen om grundläggande utbildning ska barnen delta året innan läroplikten uppkommer i ettårig förskoleundervisning eller annan verksamhet genom vilken målen för förskoleundervisningen uppnås.</p>

