title=Anvisning om begäran om omprövning
intro=Den som är missnöjd med detta beslut kan skriftligt begära omprövning. Ändring i beslutet får inte sökas genom besvär hos domstol.
right.title=Rätt att begära omprövning
right.body=Omprövning får begäras av den som beslutet avser eller vars rätt, skyldighet eller fördel direkt påverkas av beslutet (part).
time.title=Tidsfrist för omprövningsbegäran
time.body.1=En begäran om omprövning ska framställas inom 14 dagar från delfåendet av beslutet.
time.body.2=Begäran om omprövning ska lämnas in till Tillstånds- och tillsynsverket. Ett elektroniskt dokument som lämnats till en myndighet anses ha kommit in inom utsatt tid, om dokumentet kommer in senast den sista dagen av den utsatta tiden. En begäran om omprövning i pappersformat ska lämnas in till Tillstånds- och tillsynsverket senast under tidsfristens sista dag innan Tillstånds- och tillsynsverket stänger. Den som lämnar en begäran om omprövning svarar för att dokumentet inkommer inom utsatt tid.
time.body.3=En part anses ha fått del av beslutet sju dagar efter att brevet sändes eller på den mottagningsdag som anges i mottagningsbeviset eller delgivningsbeviset, om inte något annat visas.
time.body.4=Vid vanlig elektronisk delgivning anses parten ha fått del av beslutet den tredje dagen efter att meddelandet sändes.
time.body.5=Dagen för delfåendet räknas inte med i tidsfristen för omprövningsbegäran. Om den sista dagen för omprövningsbegäran infaller på en helgdag, självständighetsdagen, första maj, julafton, midsommarafton eller en helgfri lördag, får omprövning begäras den första vardagen därefter.
authority.title=Omprövningsmyndighet
authority.body=Omprövning begärs hos Tillstånds- och tillsynsverket.
authority.online=Omprövningsbegäran lämnas i första hand in via Tillstånds- och tillsynsverkets e-tjänst som kan hittas via Tillstånds- och tillsynsverkets webbplats www.lvv.fi (kräver stark autentisering med bankkoder eller liknande).
