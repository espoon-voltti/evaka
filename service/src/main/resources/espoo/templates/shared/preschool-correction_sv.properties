form.title=Omprövningsbegärans form och innehåll
form.intro=Omprövning ska begäras skriftligt. Också elektroniska dokument uppfyller kravet på skriftlig form.
form.required.lead=I omprövningsbegäran ska uppges:
form.required.1=det beslut i vilket omprövning begärs
form.required.2=hurdan omprövning som yrkas
form.required.3=på vilka grunder omprövning begärs.
form.contact=I omprövningsbegäran ska dessutom uppges namn på den som begär omprövning, personens hemkommun, postadress och telefonnummer samt övrig kontaktinformation som behövs för att ärendet ska kunna skötas.
form.email=Om omprövningsbeslutet får delges som ett elektroniskt meddelande ska också e-postadress uppges.
form.representative=Om talan för den som begär omprövning förs av personens lagliga företrädare eller ombud eller om någon annan person har upprättat omprövningsbegäran, ska även denna persons namn och hemkommun uppges i omprövningsbegäran.
form.attachments.lead=Till omprövningsbegäran ska fogas:
form.attachments.1=det beslut som avses, i original eller kopia
form.attachments.2=ett intyg över vilken dag beslutet har delgetts eller någon annan utredning över när tidsfristen för omprövningsbegäran har börjat
form.attachments.3=de handlingar som den som begär omprövning åberopar, om de inte redan tidigare har lämnats till myndigheten.
