form.title=Oikaisuvaatimuksen muoto ja sisältö
form.intro=Oikaisuvaatimus on tehtävä kirjallisesti. Myös sähköinen asiakirja täyttää vaatimuksen kirjallisesta muodosta.
form.required.lead=Oikaisuvaatimuksessa on ilmoitettava:
form.required.1=päätös, johon vaaditaan oikaisua,
form.required.2=millaista oikaisua päätökseen vaaditaan,
form.required.3=millä perusteilla oikaisua vaaditaan
form.contact=Oikaisuvaatimuksessa on lisäksi ilmoitettava tekijän nimi, kotikunta, postiosoite, puhelinnumero ja muut asian hoitamiseksi tarvittavat yhteystiedot.
form.email=Jos oikaisuvaatimuspäätös voidaan antaa tiedoksi sähköisenä viestinä, yhteystietona pyydetään ilmoittamaan myös sähköpostiosoite.
form.representative=Jos oikaisuvaatimuksen tekijän puhevaltaa käyttää hänen laillinen edustajansa tai asiamiehensä tai jos oikaisuvaatimuksen laatijana on joku muu henkilö, oikaisuvaatimuksessa on ilmoitettava myös tämän nimi ja kotikunta.
form.attachments.lead=Oikaisuvaatimukseen on liitettävä:
form.attachments.1=päätös, johon haetaan oikaisua, alkuperäisenä tai jäljennöksenä
form.attachments.2=todistus siitä, minä päivänä päätös on annettu tiedoksi, tai muu selvitys oikaisuvaatimusajan alkamisesta
form.attachments.3=asiakirjat, joihin oikaisuvaatimuksen tekijä vetoaa, jollei niitä ole jo aikaisemmin toimitettu viranomaiselle.
