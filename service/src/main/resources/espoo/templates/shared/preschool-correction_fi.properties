title=Oikaisuvaatimusohje
intro=Tähän päätökseen tyytymätön voi tehdä kirjallisen oikaisuvaatimuksen. Päätökseen ei saa hakea muutosta valittamalla tuomioistuimeen.
right.title=Oikaisuvaatimusoikeus
right.body=Oikaisuvaatimuksen saa tehdä se, johon päätös on kohdistettu tai jonka oikeuteen, velvollisuuteen tai etuun päätös välittömästi vaikuttaa (asianosainen).
time.title=Oikaisuvaatimusaika
time.body.1=Oikaisuvaatimus on tehtävä 14 päivän kuluessa päätöksen tiedoksisaannista.
time.body.2=Viranomaiselle toimitetun sähköisen asiakirjan katsotaan saapuneen määräajassa, jos asiakirja saapuu viimeistään määräajan viimeisen päivän aikana. Paperinen oikaisuvaatimuskirjelmä on toimitettava Lupa- ja valvontavirastolle viimeistään määräajan viimeisenä päivänä ennen Lupa- ja valvontaviraston aukioloajan päättymistä. Oikaisuvaatimuksen tekijä vastaa siitä, että oikaisuvaatimus on perillä määräaikaan mennessä.
time.body.3=Asianosaisen katsotaan saaneen päätöksestä tiedon, jollei muuta näytetä, seitsemän päivän kuluttua kirjeen lähettämisestä tai saantitodistukseen tai tiedoksiantotodistukseen merkittynä päivänä.
time.body.4=Käytettäessä tavallista sähköistä tiedoksiantoa asianosaisen katsotaan saaneen päätöksestä tiedon, jollei muuta näytetä, kolmantena päivänä viestin lähettämisestä.
time.body.5=Tiedoksisaantipäivää ei lueta oikaisuvaatimusaikaan. Jos oikaisuvaatimusajan viimeinen päivä on pyhäpäivä, itsenäisyyspäivä, vapunpäivä, joulu- tai juhannusaatto tai arkilauantai, saa oikaisuvaatimuksen tehdä ensimmäisenä arkipäivänä sen jälkeen.
authority.title=Oikaisuvaatimusviranomainen
authority.body=Viranomainen, jolle oikaisuvaatimus tehdään, on Lupa- ja valvontavirasto.
authority.online=Oikaisuvaatimus tehdään ensisijaisesti Lupa- ja valvontaviraston sähköisessä asiointipalvelussa, johon pääsee Lupa- ja valvontaviraston verkkosivujen kautta osoitteessa https://lvv.fi (vaatii vahvan tunnistautumisen esimerkiksi pankkitunnuksilla).
