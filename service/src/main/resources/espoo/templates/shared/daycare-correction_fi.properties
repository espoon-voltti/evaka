delivery.securemail=Jos lähetät salassa pidettäviä tai arkaluontoisia asiakirjoja, suosittelemme käyttämään kirjaamon turvapostipalvelua. Lisätietoja ja ohje löytyvät kaupungin verkkosivuilta osoitteesta https://www.espoo.fi/fi/kirjaamo.
form.title=Oikaisuvaatimuksen muoto ja sisältö
form.intro=Oikaisuvaatimus on tehtävä kirjallisesti. Myös sähköinen asiakirja täyttää vaatimuksen kirjallisesta muodosta.
form.required.lead=Oikaisuvaatimuksessa on ilmoitettava:
form.required.1=päätös, johon haetaan oikaisua
form.required.2=miten päätöstä halutaan oikaistavaksi
form.required.3=millä perusteella oikaisua vaaditaan.
form.contact=Oikaisuvaatimuksessa on lisäksi ilmoitettava tekijän nimi, kotikunta, postiosoite ja puhelinnumero.
form.email=Jos oikaisuvaatimuspäätös voidaan antaa tiedoksi sähköisenä viestinä, yhteystietona pyydetään ilmoittamaan myös sähköpostiosoite.
