title=Oikaisuvaatimusohje
intro=Tähän päätökseen tyytymätön voi tehdä kirjallisen oikaisuvaatimuksen. Päätökseen ei saa hakea muutosta valittamalla tuomioistuimeen.
right.title=Oikaisuvaatimusoikeus
right.body=Oikaisuvaatimuksen saa tehdä se, johon päätös on kohdistettu tai jonka oikeuteen, velvollisuuteen tai etuun päätös välittömästi vaikuttaa (asianosainen).
time.title=Oikaisuvaatimusaika
time.body.1=Oikaisuvaatimus on tehtävä 30 päivän kuluessa päätöksen tiedoksisaannista.
time.body.2=Oikaisuvaatimus on toimitettava kunnan kirjaamoon. Viranomaiselle toimitetun sähköisen asiakirjan katsotaan saapuneen määräajassa, jos asiakirja saapuu viimeistään määräajan viimeisen päivän aikana. Paperinen oikaisuvaatimuskirjelmä on toimitettava kunnan kirjaamoon määräajan viimeisenä päivänä ennen kirjaamon aukioloajan päättymistä.
time.body.3=Asianosaisen katsotaan saaneen päätöksestä tiedon, jollei muuta näytetä, seitsemän päivän kuluttua kirjeen lähettämisestä, saantitodistuksen osoittamana aikana tai erilliseen tiedoksisaantitodistukseen merkittynä aikana. Käytettäessä tavallista sähköistä tiedoksiantoa asianosaisen katsotaan saaneen päätöksestä tiedon, jollei muuta näytetä, kolmantena päivänä viestin lähettämisestä.
time.body.4=Tiedoksisaantipäivää ei lueta oikaisuvaatimusaikaan. Jos oikaisuvaatimusajan viimeinen päivä on pyhäpäivä, itsenäisyyspäivä, vapunpäivä, joulu- tai juhannusaatto tai arkilauantai, saa oikaisuvaatimuksen tehdä ensimmäisenä arkipäivänä sen jälkeen.
authority.title=Oikaisuvaatimusviranomainen
authority.body=Viranomainen, jolle oikaisuvaatimus tehdään, on kasvun ja oppimisen lautakunta.
