title=Anvisningar om hur man begär omprövning
intro=Den som är missnöjd med detta beslut kan göra en skriftlig begäran om omprövning. Ändring i beslutet får inte sökas genom besvär hos domstol.
right.title=Rätt att begära omprövning
right.body=Omprövning får begäras av den som beslutet avser eller vars rätt, skyldighet eller fördel direkt påverkas av beslutet (part).
time.title=Tidsfrist för begäran om omprövning
time.body.1=En begäran om omprövning ska lämnas inom 30 dagar från att den som begär omprövning har fått del av beslutet.
time.body.2=Begäran om omprövning ska lämnas in hos Esbo stads registratur. Ett elektroniskt dokument som lämnats till en myndighet anses ha kommit in inom utsatt tid, om dokumentet kommer in senast den sista dagen av den utsatta tiden. En begäran om omprövning i pappersformat ska lämnas in till kommuns registratur senast under tidsfristens sista dag innan registraturen stänger.
time.body.3=Om inte annat kan påvisas anses en part ha delgivits beslutet sju dagar efter att brevet avsändes eller vid den tidpunkt som står i mottagningsbeviset eller i ett särskilt delgivningsbevis. Vid vanlig elektronisk delgivning av ett beslut anses parten, om inte något annat påvisas, ha mottagit beslutet den tredje dagen efter att det elektroniska meddelandet har avsänts.
time.body.4=Dagen då den som begär omprövning har fått del av beslutet räknas inte med i tidsfristen för inlämning av begäran om omprövning. Om sista dagen av tidsfristen för begäran om omprövning infaller på en helgdag, självständighetsdagen, första maj, julafton, midsommarafton eller en helgfri lördag, får begäran om omprövning lämnas in den första vardagen därefter.
authority.title=Omprövningsmyndighet
authority.body=Omprövning begärs hos nämnden Svenska rum.
delivery.title=Inlämning av begäran om omprövning
delivery.lead=Begäran om omprövning kan lämnas in på olika sätt:
delivery.line.1=På Esbo stads registratur under öppettiden:
delivery.line.2=Brogatan 11, 3. vån.
delivery.line.3=Öppettid mån–fre kl. 10.00–15.45
delivery.line.4=Per papperspost: Esbo stads registratur, PB 1, 02070 ESBO STAD
delivery.line.5=Per e-post: kirjaamo@espoo.fi
delivery.line.6=Telefon: +358 9 8165 6000
delivery.securemail=Vi rekommenderar att sekretessbelagda och känsliga handlingar lämnas in via registraturens krypterade e-posttjänst. Ytterligare information och anvisningen finns på stadens webbplats https://www.espoo.fi/sv/registraturen.
form.title=Omprövningsbegärans form och innehåll
form.intro=En begäran om omprövning ska avfattas skriftligen. Också elektroniska dokument är skriftliga.
form.required.lead=I begäran om omprövning ska uppges:
form.required.1=det beslut i vilket omprövning begärs
form.required.2=hurdan omprövning som begärs
form.required.3=på vilka grunder omprövning begärs.
form.contact=I begäran om omprövning ska du dessutom uppge namnet på den som har begärt omprövning samt personens hemkommun, postadress och telefonnummer.
form.email=Om du tillåter att beslutet om begäran om omprövning delges dig elektroniskt, ska du också uppge en e-postadress.
