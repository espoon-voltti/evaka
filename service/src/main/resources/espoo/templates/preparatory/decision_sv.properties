decision.instructions.old=<p>Sovelletut oikeusohjeet:<br/>Perusopetuslaki 4, 5, 6 ja 26a §:t, perusopetusasetus 23 a §<br/>Kasvun ja oppimisen lautakunnan päätös 29.11.2023 § 187 esiopetuspaikan osoittamisperusteiden muuttamisesta.<br/>Opetus- ja varhaiskasvatuslautakunnan päätös 25.1. 2017 § 5 esiopetusikäisten perusopetukseen valmistavan opetuksen järjestämisestä.<br/>Kasvun ja oppimisen lautakunnan päätös 25.02.2026 § 36 43 tarkennuksista esiopetusta järjestettäviin yksiköihin lukuvuonna 2026-2027.</p><p>Päätöksessä ilmoitetun paikan vastaanottamis- tai kieltäytymisilmoitus on toimitettava <strong>välittömästi, viimeistään kahden viikon kuluessa</strong> tämän ilmoituksen saamisesta. Paikan voi käydä hyväksymässä/hylkäämässä sähköisesti osoitteessa <a href="https://espoonvarhaiskasvatus.fi" rel="noreferrer">espoonvarhaiskasvatus.fi</a> (vaatii tunnistautumisen) tai postitse.</p><p>Toimivalta: Ratkaisuvallan delegointipäätös suomenkielisen varhaiskasvatuksen tulosyksikön sekä kasvun ja oppimisen toimialan esikunnan viranhaltijoille 6 § 4 kohta.</p>

decision.accepting.title=Paikan vastaanottaminen / paikasta kieltäytyminen
decision.accepting=<p>Päätöksessä ilmoitetun paikan vastaanottamis- tai kieltäytymisilmoitus on toimitettava <strong>välittömästi, viimeistään kahden viikon kuluessa</strong> tämän ilmoituksen saamisesta. Paikan voi käydä hyväksymässä/hylkäämässä sähköisesti osoitteessa <a href="https://espoonvarhaiskasvatus.fi" rel="noreferrer">espoonvarhaiskasvatus.fi</a> (vaatii tunnistautumisen) tai postitse.</p><p>Toimivalta: Ratkaisuvallan delegointipäätös suomenkielisen varhaiskasvatuksen tulosyksikön sekä kasvun ja oppimisen toimialan esikunnan viranhaltijoille 6 § 4 kohta.</p>

