decision.acceptance.title=ILMOITUS KERHOPAIKAN HYVÄKSYMISESTÄ TAI HYLKÄÄMISESTÄ

decision.acceptance.unit.name=Toimipaikka
decision.acceptance.child.name=Lapsen nimi

decision.acceptance.furtherInstructions=<p>Kerhopaikan hyväksymis- tai hylkäämisilmoitus on toimitettava <strong>välittömästi, viimeistään kahden viikon kuluessa</strong> tämän ilmoituksen saamisesta. Vastauksen voit toimittaa kerhopaikkaan tai kerhopaikan johtajalle, yhteystiedot löytyvät päätöksestä.</p> <p>Voit myös käydä hyväksymässä tai hylkäämässä tämän paikan sähköisesti osoitteessa <a href="https://espoonvarhaiskasvatus.fi" rel="noreferrer">espoonvarhaiskasvatus.fi</a> (vaatii tunnistautumisen).</p>

