decision.instructions.old=<p> Päätös perustuu opetus-ja varhaiskasvatuslautakunnan 24.8.2016 § 128 päättämiin valintaperusteisiin harkinnanvaraiseen kerhotoimintaan suomenkielisessä varhaiskasvatuksessa.</p> <p> Kerhopaikan vastaanottamisesta tai kieltäytymisestä on ilmoitettava kahden viikon sisällä tämän päätöksen saapumisesta. Kieltäytymisen jälkeen voi uuden kerhopaikan saada vain uudelleen hakemalla. </p><p> Toimivalta: Suomenkielisen varhaiskasvatuksen ja sivistystoimen toimialan esikunnan viranhaltijoiden delegointipäätöksen 7.3 kohta.</p>

decision.accepting.title=Paikan vastaanottaminen / paikasta kieltäytyminen
decision.accepting=<p> Kerhopaikan vastaanottamisesta tai kieltäytymisestä on ilmoitettava kahden viikon sisällä tämän päätöksen saapumisesta. Kieltäytymisen jälkeen voi uuden kerhopaikan saada vain uudelleen hakemalla. </p><p> Toimivalta: Suomenkielisen varhaiskasvatuksen ja sivistystoimen toimialan esikunnan viranhaltijoiden delegointipäätöksen 7.3 kohta.</p>
