spring:
  application:
    name: "trevaka-service"
evaka:
  database:
    flyway:
      locations:
        - db/migration
        - tampere/db/migration
  oph:
    organizer_oid: "1.2.246.562.10.79499343246"
    organizer_id: "176" # from test environment
    municipality_code: "837"
  integration:
    sfi:
      contact_organization:
        name: "eVaka Tampere"
