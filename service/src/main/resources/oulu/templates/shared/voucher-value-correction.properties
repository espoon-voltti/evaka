title=Oikaisuvaatimusohjeet
content.p1=Oikaisuvaatimus tehdään siinä tapauksessa, mikäli olette tyytymätön teille tulojenne mukaan määriteltyyn palvelusetelin arvoon. Oikaisuvaatimuksen voi tehdä 30 päivän sisällä siitä päivästä, jolloin päätös on annettu tiedoksi. Asianosaisen katsotaan saaneen päätöksestä tiedon seitsemän (7) päivän kuluttua kirjeen lähettämisestä. Käytettäessä sähköistä tiedoksiantoa katsotaan asianosaisen saaneen päätöksestä tiedon kolmantena (3) päivänä viestin lähettämisestä.
content.p2=Oikaisuvaatimuksen tulee sisältää liitteet ja päätös, johon haetaan oikaisua. Vaatimuksessa tulee käydä ilmi, miltä osin päätökseen haetaan muutosta, vaatimuksen perusteet, oikaisunhakijan tai hänen valtuuttamansa edustajansa allekirjoitus sekä oikaisunhakijan tai hänen asiamiehensä osoite.
address.content=<p>Oikaisuvaatimus toimitetaan joko <br/>\
  - postitse: Oulun kaupungin kirjaamo, PL 71, 90015 Oulun kaupunki<br/>\
  - sähköisesti: kirjaamo@ouka.fi<br/>\
  - tuomalla se Oulun kaupungin kirjaamoon: Kansankatu 55 A, 90120 Oulu, avoinna ma-pe 8.30-15.30<br/>\
  </p>