  const md = "# 3. Tietomalli\n\nTässä luvussa kuvataan eNivel-järjestelmän tietomalli — sekä **eNivelen sisäisesti tallentama tieto** että **eVakan ja eNivelen välisen rajapinnan tietorakenteet**. Tietomalli on jäsennelty kolmeen tasoon: oppilas-tason perustiedot, tukeen liittyvät tiedot, ja asiakirjat (ml. niiden siirtoon liittyvä metatieto).\n\n## 3.1 Yleiskatsaus\n\nLapsen tiedot siirretään varhaiskasvatuksen järjestelmästä (esim. eVaka) perusopetuksen järjestelmään (esim. DigiOne, Primus) eNivel-järjestelmän kautta. Tietomalli kattaa seuraavat pääkäsitteet:\n\n- **Oppilas** ja **Perustiedot** — yksilöivät tunnisteet ja sijoitustieto\n- **Esiopetussijoitus** ja **Esiopetusryhmä** — esiopetusyksikkö ja -ryhmä, jossa lapsi on\n- **Tuen tiedot** — tuen tarpeen luokitus + tuen ajanjaksot ja tukitoimet (rakenteinen)\n- **Tukipäätösten yhteenveto** — tukipäätöksiä ei siirretä asiakirjoina, vaan rakenteellisena lukumäärä- ja päivämäärätietona\n- **Koulusijoitus** ja **Kouluryhmä** — kohdekoulu ja luokka\n- **Asiakirjapohja** — eVakan `document_template`, joka voi olla merkitty siirrettäväksi perusopetukseen\n- **Asiakirja** — eVakan `child_document`-ilmentymä, joka on siirretty eNiveleen pohjan ja huoltajan/henkilökunnan polun kautta\n- **Asiakirjan siirron metatieto** — käsittelypolku, idempotenssitunniste, siirron aikaleimat, poistoaika\n\n## 3.2 ER-kaavio\n\n```mermaid\nerDiagram\n    OPPILAS ||--|| PERUSTIEDOT : \"omistaa\"\n    OPPILAS ||--o{ ESIOPETUSSIJOITUS : \"osallistuu\"\n    OPPILAS ||--o| TUEN_TIEDOT : \"saa\"\n    OPPILAS ||--o{ ASIAKIRJA : \"liittyy\"\n    OPPILAS ||--o{ TUKIPAATOSTEN_YHTEENVETO : \"saa\"\n    OPPILAS ||--o| KOULUSIJOITUS : \"siirtyy\"\n\n    ESIOPETUSSIJOITUS }o--|| ESIOPETUSRYHMA : \"kuuluu\"\n\n    TUEN_TIEDOT ||--o{ TUEN_AJANJAKSO : \"sisältää\"\n    TUEN_AJANJAKSO ||--o{ TUKITOIMI : \"sisältää\"\n\n    ASIAKIRJAPOHJA ||--o{ ASIAKIRJA : \"instanssoi\"\n\n    KOULUSIJOITUS ||--o| KOULURYHMA : \"kuuluu\"\n\n    OPPILAS {\n        uuid oppija_oid PK\n        string hetu\n        string etunimi\n        string sukunimi\n        date syntymaaika\n    }\n    PERUSTIEDOT {\n        string kotiosoite\n    }\n    ESIOPETUSSIJOITUS {\n        uuid yksikon_id\n        string yksikon_nimi\n        date alkupvm\n        date loppupvm\n    }\n    ESIOPETUSRYHMA {\n        uuid ryhman_id\n        string ryhman_nimi\n    }\n    TUEN_TIEDOT {\n        enum tuen_taso\n        string arvio_tuen_tarpeesta\n    }\n    TUEN_AJANJAKSO {\n        date alkupvm\n        date loppupvm\n    }\n    TUKITOIMI {\n        string nimi\n        string kuvaus\n    }\n    TUKIPAATOSTEN_YHTEENVETO {\n        enum paatostyyppi\n        date laatimispvm\n        int lukumaara\n    }\n    ASIAKIRJAPOHJA {\n        uuid id PK\n        string nimi\n        enum tyyppi\n        bool transferable_to_basic_education\n        int retention_period_months\n    }\n    ASIAKIRJA {\n        uuid id PK\n        uuid pohja_id FK\n        enum kasittelypolku\n        timestamp transferred_at\n        timestamp delete_at\n        json sisalto\n        binary pdf\n    }\n    KOULUSIJOITUS {\n        uuid koulun_id\n        string koulun_nimi\n    }\n    KOULURYHMA {\n        string ryhman_nimi\n        string luvitettu_opettaja\n    }\n```\n\n## 3.3 Entiteettien kuvaukset\n\n### 3.3.1 Oppilas\n\nOppilas on järjestelmän keskeisin entiteetti. Yksilöivänä tunnisteena käytetään ensisijaisesti oppijanumeroa (oppija_oid); henkilötunnus on toissijainen tunniste.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| oppija_oid | string | Opetushallituksen oppijanumero (Koski) | Pakollinen |\n| hetu | string | Suomalainen henkilötunnus (DDMMYY-XXXX tai DDMMYYAXXXX) | Valinnainen jos hetu puuttuu |\n| etunimi | string | Etunimi | Pakollinen |\n| sukunimi | string | Sukunimi | Pakollinen |\n| syntymaaika | date | Syntymäaika (käytetään jos hetu puuttuu) | Valinnainen |\n\n**Relaatiot:**\n- Omistaa yhden **Perustiedot**-entiteetin (1:1)\n- Voi osallistua useaan **Esiopetussijoitus**-entiteettiin (1:N)\n- Voi saada yhden **Tuen tiedot** -entiteetin (1:0..1)\n- Voi liittyä useaan **Asiakirja**-entiteettiin (1:N)\n- Voi saada useita **Tukipäätösten yhteenveto** -merkintöjä (1:N)\n- Siirtyy yhteen **Koulusijoitus**-entiteettiin (1:0..1)\n\n### 3.3.2 Perustiedot\n\nOppilaan yhteystiedot, joita ei ole jo Oppilas-entiteetissä.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| kotiosoite | string | Oppilaan kotiosoite | Pakollinen |\n\n**Relaatiot:** Kuuluu yhteen **Oppilas**-entiteettiin (1:1).\n\n### 3.3.3 Esiopetussijoitus\n\nLapsen sijoitus esiopetusyksikköön tietyllä ajanjaksolla.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| yksikon_id | uuid | Esiopetusyksikön yksilöivä tunniste (eVaka) | Pakollinen |\n| yksikon_nimi | string | Esiopetusyksikön nimi | Pakollinen |\n| alkupvm | date | Sijoituksen alkamispäivämäärä | Pakollinen |\n| loppupvm | date | Sijoituksen päättymispäivämäärä | Valinnainen |\n\n**Relaatiot:**\n- Kuuluu yhteen **Oppilas**-entiteettiin (N:1)\n- Kuuluu yhteen **Esiopetusryhmä**-entiteettiin (N:1)\n\n### 3.3.4 Esiopetusryhmä\n\nRyhmä esiopetusyksikön sisällä.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| ryhman_id | uuid | Ryhmän yksilöivä tunniste | Pakollinen |\n| ryhman_nimi | string | Ryhmän nimi (esim. \"Kimalaiset\") | Pakollinen |\n\n### 3.3.5 Tuen tiedot\n\nLapsen ajantasainen tuen luokitus ja vapaa kuvaus. Tämä on rakenteinen yhteenveto, joka voi täydentyä asiakirjoihin sisältyvästä tiedosta.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| tuen_taso | enum | `EI_TUKEA` \\| `TEHOSTETTU_TUKI` \\| `ERITYINEN_TUKI` \\| `LAPSIKOHTAINEN_TUKI` \\| muut Miron listan mukaan | Pakollinen |\n| arvio_tuen_tarpeesta | string | Vapaa teksti (esim. \"Emilia hyötyy pienryhmätyöskentelystä…\") | Valinnainen |\n\n**Relaatiot:**\n- Kuuluu yhteen **Oppilas**-entiteettiin (1:1)\n- Sisältää useita **Tuen ajanjakso** -entiteettejä (1:N)\n\n> **Huomio:** Vapaa teksti `arvio_tuen_tarpeesta` ei ole eVakassa rakenteisena. Se tuodaan eVakan asiakirjapohjaan kytketyn vapaan tekstikentän kautta — Figma-mockupissa tähän on liitetty huomio *\"TÄTÄ EI OLE EVAKASSA RAKENTEELLISENA!\"*. Kuntakohtainen sovitus voi ratkaista tämän eri tavoin (vapaa kenttä, valittavissa olevat lauseet, tai lähde asiakirjasta).\n\n### 3.3.6 Tuen ajanjakso ja tukitoimi\n\n| Tuen_ajanjakso | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| alkupvm | date | Ajanjakson alku | Pakollinen |\n| loppupvm | date | Ajanjakson loppu | Valinnainen |\n\n| Tukitoimi | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| nimi | enum | Tukitoimen nimi (esim. *Osa-aikainen erityisopetus*, *Pienryhmätoiminta*) | Pakollinen |\n| kuvaus | string | Vapaa teksti | Valinnainen |\n\n### 3.3.7 Tukipäätösten yhteenveto\n\nTukipäätösasiakirjoja itseään **ei siirretä** eNiveleen — ne menevät Koskeen. eNiveleen siirretään sen sijaan **rakenteellinen yhteenveto**: per oppilas, mitä tukipäätöstyyppejä on tehty ja milloin.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| paatostyyppi | enum | Esim. `EO_TUEN_PAATOS`, `PIDENNETYN_OPPIVELVOLLISUUDEN_PAATOS` | Pakollinen |\n| laatimispvm | date | Päätöksen laatimispäivämäärä | Pakollinen |\n| voimassaoloalku | date | Päätöksen voimassaolon alku | Valinnainen |\n| voimassaololoppu | date | Päätöksen voimassaolon loppu | Valinnainen |\n\n> Tällä tavalla perusopetuksen henkilökunta saa eNivelestä tiedon että lapsella on tukipäätös, milloin se on tehty ja minkä tyyppinen — itse päätösasiakirja haetaan tarvittaessa Koskesta.\n\n### 3.3.8 Asiakirjapohja\n\nVastaa eVakan `document_template`-tauluriviä. Pohja on eVaka-pääkäyttäjän luoma sapluuna, joka instantioidaan lapsille. Pohjan **uudella `transferable_to_basic_education`-flagilla** ohjataan, voidaanko siitä luotu asiakirja siirtää eNiveleen.\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| id | uuid | Pohjan tunniste eVakassa | Pakollinen |\n| nimi | string | Pohjan nimi (esim. *Tiedonsiirtolomake*) | Pakollinen |\n| tyyppi | enum | eVakan `ChildDocumentType`: `CITIZEN_BASIC` (huoltajan polku), `OTHER` (henkilökunnan polku), `OTHER_DECISION`, `PEDAGOGICAL_*`, `VASU`, `LEOPS` jne. | Pakollinen |\n| transferable_to_basic_education | bool | **Uusi kenttä.** Vain jos `true`, eVakan siirtotehtävä poimii tämän pohjan ilmentymät eNiveleen | Pakollinen, oletus `false` |\n| retention_period_months | int | Säilytysaika eNivelessä (kuukausina). *Vaihtoehtoisesti hallitaan eNivelen ympäristökonfiguraationa, ks. luku 3.5* | Valinnainen |\n| pakolliset_roolit | enum-set | Ketkä eVaka-roolit voivat luoda ilmentymän (johdettu eVakan `CREATE_CHILD_DOCUMENT`-actionin säännöistä) | Tiedoksi |\n\n**Pohjat eivät siirry eNiveleen** — pohjan tiedot näkyvät eNivelessä vain ilmentymän kautta (esim. asiakirjan otsikko = pohjan nimi).\n\n> **Pedagogisten asiakirjojen suoja:** vaikka `transferable_to_basic_education`-flagi olisi vahingossa kytketty `true`-arvoon pedagogisen asiakirjan pohjalle, eVaka-pääkäyttäjä on käytännössä ainoa joka pohjia luo, ja flagi kulkee pohjan staging→tuotanto-importin mukana. Mahdollinen lisäsuoja: koodissa rajataan että vain tietyt `ChildDocumentType`-arvot saavat olla `transferable_to_basic_education = true` (suositus: `CITIZEN_BASIC` ja `OTHER`; ei koskaan `PEDAGOGICAL_*`, `VASU`, `LEOPS`).\n\n### 3.3.9 Asiakirja (siirretty ilmentymä)\n\neVakan `child_document`-rivin siirretty kopio eNivelessä. Tunnistetaan **eVakan alkuperäisellä UUID:llä** (idempotenssi).\n\n| Attribuutti | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| id | uuid | eVakan `child_document.id` (sama eNivelessä → idempotentti PUT) | Pakollinen |\n| pohja_id | uuid | Viittaus pohjaan | Pakollinen |\n| pohja_nimi | string | Pohjan nimi siirron hetkellä (denormalisoitu) | Pakollinen |\n| pohja_tyyppi | enum | Pohjan `ChildDocumentType` siirron hetkellä | Pakollinen |\n| oppija_oid | string | Lapsen oppijanumero (FK Oppilas) | Pakollinen |\n| kasittelypolku | enum | `HUOLTAJAN_HYVAKSYNNALLA` (pohjan tyyppi `CITIZEN_BASIC`) \\| `HENKILOKUNNAN_PAATOKSELLA` (pohjan tyyppi `OTHER` tms.) — **johdetaan pohjan tyypistä** | Pakollinen |\n| sisalto | json | Asiakirjan rakenteinen sisältö (kysymykset ja vastaukset eVakan `DocumentTemplateContent`-rakenteen mukaan) | Pakollinen |\n| pdf | binary | Asiakirjan PDF-versio (julkaistu, lukittu sisältö) | Pakollinen |\n| created_at | timestamp | Milloin ilmentymä luotiin eVakassa | Pakollinen |\n| guardian_approved_at | timestamp | Milloin huoltaja hyväksyi (jos `kasittelypolku = HUOLTAJAN_HYVAKSYNNALLA`) | Ehdollinen |\n| staff_finalized_at | timestamp | Milloin henkilökunta merkkasi valmiiksi (jos `kasittelypolku = HENKILOKUNNAN_PAATOKSELLA`) | Ehdollinen |\n| transferred_at | timestamp | Milloin eNivel vastaanotti onnistuneesti | Pakollinen |\n| delete_at | timestamp | Milloin eNivel poistaa tämän asiakirjan (säilytyssäännön mukaan) | Pakollinen |\n\n**Relaatiot:**\n- Liittyy yhteen **Oppilas**-entiteettiin (N:1)\n- Instantioi yhden **Asiakirjapohja**-entiteetin (N:1)\n\n> **Sisältö lukittu hyväksynnän jälkeen:** Kun asiakirja on siirtynyt eNiveleen, sen sisältöä ei voi enää muokata. eVakassa myös sisältö on lukossa kun viimeinen tilasiirtymä on tehty (huoltaja hyväksynyt tai henkilökunta merkannut valmiiksi). Muutostarpeissa luodaan uusi ilmentymä, joka saa uuden UUID:n ja siirtyy itsenäisesti eNiveleen.\n\n### 3.3.10 Koulusijoitus ja Kouluryhmä\n\n| Koulusijoitus | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| koulun_id | string | Koulun tunniste | Pakollinen |\n| koulun_nimi | string | Koulun nimi | Pakollinen |\n\nKoulusijoituksen tieto tulee eNiveleen *ulkopuolelta* — esim. CSV-tuontina (Figma-mockupissa tapahtumalogissa \"Koulupaikkapäätös kouluun Topeliuksen koulu (CSV-tuonti)\") tai erillisestä oppilaaksiottojärjestelmästä. Tarkka mekanismi käsitellään luvussa 5 (Integraatiovaatimukset).\n\n| Kouluryhmä | Tyyppi | Kuvaus | Pakollisuus |\n|---|---|---|---|\n| ryhman_nimi | string | Luokka (esim. \"1A\") | Valinnainen |\n\n> Yhteys opettajiin ei ole Kouluryhmä-entiteetin attribuutti, vaan tieto siitä, ketkä opettajat näkevät kouluryhmän oppilaiden tiedot, löytyy `staff_user_class_authorization`-taulusta (ks. 3.3.11 ja 7.5.5). Mahdollinen UI-tarkoituksinen denormalisaatio (esim. \"luokan vastuuopettaja\" -näytön kenttä) tehdään kyselyajossa, ei tietomallissa.\n\n### 3.3.11 Käyttäjäentiteetit (`staff_user`-perhe)\n\neNivelen sisäisen luvituksen entiteetit. Yksityiskohtainen taulurakenne esitetään luvussa 7.5.5; tässä luvussa esitellään niiden semantiikka tietomallin näkökulmasta.\n\n| Entiteetti | Kuvaus |\n|---|---|\n| **Käyttäjä** (`staff_user`) | eNivelen henkilökäyttäjä, jolla on yksi rooli: `PAAKAYTTAJA`, `REHTORI` tai `OPETTAJA`. |\n| **Käyttäjän identiteetti** (`staff_user_identity`) | Yhdistää käyttäjän yhteen tai useampaan tunnistautumislähteeseen (provider = `MPASSID`, `ENTRA_ID`, `EDU_AD`). MVP:ssä käytännössä yksi rivi per käyttäjä — opettajalla MPASSid (ankkurina OPH:n oppijanumero), rehtorilla/pääkäyttäjällä kunnan Entra ID. |\n| **Käyttäjän kouluvastuu** (`staff_user_school_role`) | REHTORI- ja koulurajatun PAAKAYTTAJA-käyttäjän näkyvyysrajaus yhteen tai useampaan kouluun. Globaalin pääkäyttäjän tunnistaa rivien puuttumisesta. |\n| **Käyttäjän luokkavastuu** (`staff_user_class_authorization`) | OPETTAJA-käyttäjän luokkatason näkyvyysrajaus muodossa *(koulu, luokan_nimi)*. |\n\n**Identiteetin ankkurointi:** MPASSidista saatava OPH:n oppijanumero ja Entra ID:stä saatava UPN/objectId ovat ne tunnisteet, joilla `staff_user_identity`-taulu sitoo kirjautuvan käyttäjän eNivelen `staff_user`-riviin. MVP:ssä yksi tunnistautumislähde per käyttäjä on riittävä — käyttäjien yhdistämislogiikka kahden eri lähteen välillä tehdään vaiheen 2 jälkeen, jos edu-AD otetaan käyttöön opettajille.\n\n**Oppilaitos-tunniste:** MPASSid raportoi kirjautuneen opettajan oppilaitoksen OPH:n oppilaitos-OID:llä, joka on sama tunniste kuin `koulu.id`:n natural key eNivelessä. Tämä mahdollistaa UC-10:n (luvittamattomien opettajien listan) ilman erillistä mappausylläpitoa.\n\n## 3.4 Käsittelypolut ja niiden tilakaavio\n\neVakan `child_document` siirtyy eNiveleen toista kahdesta polusta:\n\n```mermaid\nstateDiagram-v2\n    [*] --> DRAFT: Henkilökunta luo\n\n    state \"Huoltajan polku (CITIZEN_BASIC)\" as huoltaja {\n        DRAFT --> CITIZEN_DRAFT: Lähetetty huoltajalle\n        CITIZEN_DRAFT --> COMPLETED_huoltaja: Huoltaja hyväksyy<br/>(sisältö + siirto)\n    }\n\n    state \"Henkilökunnan polku (OTHER)\" as hk {\n        DRAFT --> COMPLETED_hk: Henkilökunta merkkaa<br/>valmiiksi\n    }\n\n    DRAFT --> huoltaja: pohjan tyyppi<br/>= CITIZEN_BASIC\n    DRAFT --> hk: pohjan tyyppi<br/>= OTHER tms.\n\n    COMPLETED_huoltaja --> TRANSFERRING: Background job poimii\n    COMPLETED_hk --> TRANSFERRING: Background job poimii\n    TRANSFERRING --> TRANSFERRED: eNivel-API onnistui\n    TRANSFERRING --> TRANSFER_FAILED: Virhe → retry\n    TRANSFER_FAILED --> TRANSFERRING: Retry\n    TRANSFERRED --> [*]\n```\n\n| Polku | eVakan pohjan tyyppi | Tilat (eVaka) | Hyväksyjä | Näkyvyys huoltajalle eVakassa |\n|---|---|---|---|---|\n| **Huoltajan polku** | `CITIZEN_BASIC` | DRAFT → CITIZEN_DRAFT → COMPLETED | Huoltaja (yhden hyväksyntä riittää, kuten muutkin CITIZEN_BASIC-asiakirjat) | Citizen-UI:ssa hyväksyntää varten |\n| **Henkilökunnan polku** | `OTHER` (tai vastaava staff-only-tyyppi) | DRAFT → COMPLETED | Henkilökunta itse | Citizen-UI:ssa informatiivisesti, kuten VASU |\n\n> **Huomio:** Sama lapsi voi saada *molemmat* polut rinnan, jos henkilökunta päättää siirtää tietoa myös ilman huoltajan lupaa. Henkilökunnan polun ilmentymä on eri pohjasta luotu, eikä sitä esitäytetä huoltajan polun sisällöstä.\n\n## 3.5 Säilytys ja poisto\n\neNivelen säilytysaika on **ympäristökohtainen konfiguraatio** (esim. \"tiedot poistuvat 31.10.2027\"). Käyttöliittymässä tämä näkyy huomiona käyttäjille (Figma Frame 59: \"Tiedot poistuvat 31.10.2027\").\n\n- `delete_at`-aikaleima asetetaan asiakirjailmentymään siirron yhteydessä eNivelen oletuspoistoaikataulun mukaan.\n- Asiakirjapohjan `retention_period_months` (jos asetettu) voi ohittaa oletuksen yksittäisille pohjatyypeille.\n- eNivel suorittaa poiston taustatehtävänä päivittäin: jos `delete_at < now()`, asiakirja ja siihen liittyvä `pdf`-blob poistetaan kokonaan.\n\n## 3.6 Tietovirta korkealla tasolla\n\n```mermaid\nflowchart LR\n    subgraph eVaka\n        DT[document_template<br/>+ transferable_to_basic_education]\n        CD[child_document<br/>+ siirron metakentät]\n        Huoltaja[Citizen UI<br/>huoltajan hyväksyntä]\n        HK[Employee UI<br/>henkilökunnan polku]\n        BG[Background job<br/>siirtotehtävä]\n    end\n\n    subgraph eNivel\n        API[\"REST API<br/>PUT /asiakirjat/{uuid}\"]\n        Db[(Asiakirjat<br/>+ Oppilastiedot<br/>+ Tukitiedot)]\n        UI[eNivel UI<br/>perusopetukselle]\n    end\n\n    subgraph Kohde\n        DigiOne[(DigiOne)]\n        Primus[(Primus)]\n    end\n\n    Koski[(Koski)]\n\n    DT -.->|\"flag ohjaa\"| BG\n    CD -->|\"COMPLETED-tilainen\"| BG\n    Huoltaja -->|\"hyväksyy\"| CD\n    HK -->|\"luo + merkkaa valmiiksi\"| CD\n    BG -->|\"PUT idempotent UUID\"| API\n    API --> Db\n    Db --> UI\n    UI -.->|\"haku\"| DigiOne\n    UI -.->|\"haku\"| Primus\n\n    eVaka -.->|\"tukipäätökset\"| Koski\n    eVaka -->|\"tukipäätösten yhteenveto<br/>(rakenteinen, ei asiakirjoja)\"| API\n```\n\n## 3.7 Tietotyypit ja validointisäännöt\n\n| Tietotyyppi | Formaatti | Validointisääntö |\n|---|---|---|\n| oppija_oid | string | OPH:n oppijanumero, OID-muoto (esim. `1.2.246.562.24.XXXXXXXXXXX`). **Yhteinen tunniste eVakan, eNivelen, DigiOnen IdM-API:n, Koski-tietovarannon ja MPASSidin välillä.** |\n| oppilaitos_oid | string | OPH:n oppilaitos-OID (esim. `1.2.246.562.10.XXXXXXXXXXX`). **Käytetään `koulu.id`:n natural keynä** — yhteensopiva DigiOnen IdM-API:n `<school-position>`-elementin ja MPASSidin opettajan oppilaitos-claimsin kanssa. |\n| tuen_taso | enum (OPH-koodisto) | `oppimisentuki`-koodisto, ks. OPH:n koodistopalvelu |\n| opiskeluoikeudentyyppi | string (OPH-koodiston URI) | Esim. `https://virkailija.opintopolku.fi/koodisto-service/.../opiskeluoikeudentyyppi_perusopetus` (sama URI-muoto DigiOnen IdM-API:ssa) |\n| perusopetuksen_luokkaaste | string (OPH-koodiston URI) | `perusopetuksenluokkaaste_N` |\n| hetu | string | Suomalainen henkilötunnus (DDMMYY-XXXX tai DDMMYYAXXXX). Lain mukainen muoto. **Toissijainen tunniste** — ensisijainen on oppija_oid. |\n| date | ISO 8601 | YYYY-MM-DD |\n| timestamp | ISO 8601 | YYYY-MM-DDTHH:MM:SS+ZZZZ |\n| uuid | UUID v4 | RFC 4122 |\n| asiakirja-id | UUID v4 | **eVakassa luotu, käytetään myös eNivelessä → idempotenssi** |\n\n> **OPH-koodistot natural keyinä:** eVaka, DigiOnen IdM-API ja Koski-tietovaranto käyttävät kaikki OPH:n koodistopalvelun URI-muotoa luokituksissa (opiskeluoikeudentyyppi, luokkaaste, tuen muodot). eNivel käyttää näitä samoja koodisto-URI:ta tunnisteina, jolloin mappauskerros muiden järjestelmien suuntaan poistuu lähes kokonaan.\n\n## 3.8 Huomioita tietomallista\n\n1. **Henkilötiedot ja arkaluonteinen data:** Kaikki tukitiedot ja asiakirjat ovat arkaluonteisia. eNivel toteuttaa GDPR- ja kansallisen tietosuojalain vaatimukset luvituksen, säilytyksen ja lokituksen suhteen (ks. luku 6).\n\n2. **Idempotenssi:** Saman ilmentymän siirtäminen useaan kertaan ei luo duplikaatteja eNivelessä. UUID toimii yksilöivänä avaimena.\n\n3. **Sisältö lukittuu hyväksynnän jälkeen:** Asiakirjailmentymän sisältöä ei voi muuttaa eVakassa eikä eNivelessä viimeisen tilasiirtymän jälkeen. Muutos = uusi ilmentymä uudella UUID:llä.\n\n4. **Tukipäätösten erityiskäsittely:** Päätösasiakirjoja ei siirretä eNiveleen — vain niiden rakenteinen yhteenveto. Itse päätös arkistoidaan Koskeen.\n\n5. **Pedagogiset asiakirjat:** Pedagogisia asiakirjoja (PEDAGOGICAL_*, VASU, LEOPS) ei siirretä. Suoja toteutuu pohjan `transferable_to_basic_education`-flagin kautta — eVaka-pääkäyttäjä jättää flagin pois pedagogisilta pohjilta. Lisäsuojana koodi voi rajata flagin sallituille pohja-tyypeille.\n\n6. **Kuntakohtainen sovitus:** Eri kunnat käyttävät eri pohjia. Pohjan `transferable_to_basic_education`-flagi konfiguroidaan kuntakohtaisesti eVakan staging-ympäristössä ja siirretään tuotantoon import-export-toimintoa käyttäen.\n";
