<script>
  const md = "# 1. Johdanto\n\n## 1.1 Hankkeen tausta\n\nOppimisen ja koulunkäynnin tuki uudistui esi- ja perusopetuksessa **1.8.2025 alkaen** voimaan tulleen lakimuutoksen myötä. Lakimuutos vaikuttaa tuesta kirjattaviin tietoihin ja niiden myötä kirjaamiskäytäntöihin sekä tiedonsiirtoihin.\n\nOpetus- ja kulttuuriministeriö on myöntänyt **valtionavustuksen `va-okm-2025-21-42`** uudistuksen edellyttämien muutosten toteuttamiseksi. Päätöksen sanamuoto:\n\n> *\"Myönnetyllä avustuksella edistetään yhtenäistä käytäntöä kirjata tuen tiedot esi- ja perusopetuksessa. Avustusta myönnetään tuesta kirjattavien uusien ja muuttuneiden tietojen aiheuttamiin välttämättömiin tietojärjestelmä- ja rajapintamuutoksiin (esim. tuen päätöksestä kirjattavat tiedot ja niiden siirtyminen oppilastietojärjestelmästä esiopetuksesta perusopetukseen, kansallisiin tiedonkeruisiin tai Koski-palveluun).\"*\n\n**Turun ja Oulun kaupungit** kehittävät yhteistyössä ratkaisua esi- ja perusopetuksen välisen nivelvaiheen tiedonsiirron edistämiseksi. Tätä ratkaisua kutsutaan tässä asiakirjassa nimellä **eNivel**.\n\n## 1.2 Hankkeen vaiheet\n\nHanke etenee kahdessa vaiheessa:\n\n### Vaihe 1 — Tekninen määrittely (kevät 2026)\n\nTämän asiakirjan käsittelemä vaihe. Tilaaja on Turun kaupungin tietohallinto (yhteyshenkilö Sami Koponen) ja toteuttaja Reaktor Innovations Oy. Hankintapäätös: Turun IT-palvelujohtaja Joni Ilmanen 19.3.2026 § 25 (asia 2376-2026). Aikataulu: 25.3.–30.6.2026, kustannukset enintään 28 500 € (alv 0 %). Sopimuskehys: Turun ja Reaktorin \"Varhaiskasvatuksen toiminnanohjausjärjestelmän (eVaka) kehitys- ja ylläpitokumppanuus\" (16.1.2026).\n\n**Vaiheen 1 tuotos** on ratkaisukuvaus + määrittelytyö, johon kuuluu:\n- Mistä, miten ja minne tietoja siirretään\n- Käyttäjätarinat\n- Luonnokset järjestelmämuutoksista\n- Tietovirtakuva\n- Tietomallikuva\n- Tietoturva- ja tietosuojanäkökulmat\n\n### Vaihe 2 — Toteutus (vaiheen 1 jälkeen, päättyy 31.8.2026)\n\nVaiheen 1 määrittelyn perusteella tilaaja pyytää tarjoukset järjestelmäkokonaisuuteen liittyviltä toimittajilta:\n- eVakan muutostyöt (Reaktor) — luku 7\n- DigiOnen muutostyöt (DigiOne-toimittaja)\n- eNivelen teknisen alustan toteutus (oma kilpailutus)\n- Mahdolliset muutokset Primukseen ja muihin kohdejärjestelmiin\n\n## 1.3 Tavoite ja periaatteet\n\neNivelen tavoitteena on **mahdollistaa käyttäjäystävällinen ja turvallinen tietojen siirto varhaiskasvatuksesta perusopetukseen**.\n\nAvustuspäätöksen mukaan kehitystyö **tulee suunnitella ja toteuttaa siten, että tulokset ovat hyödynnettävissä myös muiden opetuksen järjestäjien järjestelmissä** — ei vain Turun ja Oulun nykyarkkitehtuurissa.\n\nKeskeiset periaatteet:\n\n1. **Järjestelmäriippumattomuus** — ratkaisun on tuettava kehittyviä lähde- ja kohdejärjestelmiä; ei suoraa eVaka → DigiOne -rajapintaa\n2. **Käyttäjälähtöisyys** — sekä huoltajan että henkilökunnan polut tukevat oppilaaksioton aikataulua ja arjen työtä\n3. **Tietosuoja ja tietoturva lähtökohtina** — arkaluontoisen henkilödatan käsittely huomioidaan alusta alkaen arkkitehtuurissa, rajapinnoissa, käyttöoikeuksissa ja luvituksessa\n4. **Selkeä tietomalli** — tiedon eri osien tietovirrat ja omistajat ovat selkeitä ja yksinkertaisia\n5. **Lyhyt elinkaari välivarastossa** — eNivelen tiedot poistuvat ympäristökohtaisesti määriteltynä ajankohtana; pysyvä tieto on Koskessa ja lähdejärjestelmissä, esimerkiksi eVakassa.\n\n## 1.4 Rajaukset\n\n### Arkkitehtuuri\n\n- Esi- ja perusopetuksen välisen tiedonsiirron arkkitehtuurikuvaus\n- eVakan muutostarpeiden ja eNivel-järjestelmän toteutusvaatimusten määrittely\n- eNivelen REST API:n suunnittelu (Push & Pull)\n- Käyttäjätarinat ja käyttöliittymäluonnokset Figmassa\n\n### Tekniset tarkennukset\n\n- **eNivelen oma web-käyttöliittymä** — pakollinen MVP:hen, jotta järjestelmä saadaan käyttöön seuraavalla kaudella koulupaikkojen jakamisen tueksi (rehtorit ja opettajat lukevat asiakirjoja, jotka aiemmin olivat paperilla tai Dotku-tietovarannossa)\n- **Sisäinen kaksitasoinen luvitus** — pääkäyttäjä luvittaa rehtorit kouluihin, rehtori luvittaa opettajat luokkiin\n- **Tunnistautuminen** — opettajat MPASSidillä, rehtorit ja pääkäyttäjät kunnan Entra ID:llä\n- **eVakan asiakirjapohjien siirtomerkintä** ja siirtotehtävä eNiveleen\n- **Tukipäätösten yhteenveto** rakenteisena tietona\n\n### Huomioon otetut kokonaisuudet\n\n- Espoon, Tampereen seudun ja muiden kuntien tarpeet\n- Primus, Effica ja muut katselu-/lukuohjelmat\n- Erikoisempien tilanteiden käsittely (esim. hetun muuttuminen)\n- **Ohjelmallinen integraatio kohdejärjestelmiin** (DigiOne, Primus, Wilma, sijoittelutyökalut) — API rakennetaan alusta lähtien yhteensopivaksi. Esimerkiksi rakenteinen tieto erityisluokkasijoittelua varten yksinkertaista hakea eNivelestä\n\n### Ulkopuolelle jäävät asiat\n\n- Karttapalvelun / oppilaaksiottojärjestelmän sisäiset toiminnallisuudet\n- DigiOnen / Primuksen sisäiset käyttöliittymämuutokset\n- eNivelen tekninen toteutus ja käyttöönotto (vaiheen 2 työtä)\n\n## 1.5 Asiakirjan rakenne\n\n| Luku | Sisältö |\n|---|---|\n| 2 — Järjestelmäarkkitehtuuri | Korkean tason arkkitehtuuri, periaatteet, sijoittuminen muihin järjestelmiin |\n| 3 — Tietomalli | Entiteetit, attribuutit, relaatiot, tilakaaviot |\n| 4 — Käyttötapaukset ja vaatimukset | UC-1...UC-9, käyttäjäroolit, käyttäjätarinat |\n| 5 — Integraatiovaatimukset | REST API:t (Push, Pull), tunnistus ja luvitus |\n| 6 — Ei-funktionaaliset vaatimukset | Tietosuoja, tietoturva, audit, suorituskyky, käytettävyys |\n| 7 — Toteutuksen näkökulmat | eVakan muutoslista, eNivelen toteutusehdotukset, vaiheistus |\n\n## 1.6 Termit ja lyhenteet\n\n| Termi | Selitys |\n|---|---|\n| **eNivel** | Tämän hankkeen kohteena oleva järjestelmä — välivarasto esi- ja perusopetuksen tiedonsiirrolle |\n| **eVaka** | Varhaiskasvatuksen toiminnanohjausjärjestelmä (lähdejärjestelmä) |\n| **DigiOne** | Perusopetuksen oppilashallintojärjestelmä (kohdejärjestelmä Turku/Oulu) |\n| **Primus** | Vaihtoehtoinen perusopetuksen oppilashallintojärjestelmä |\n| **Koski** | Opetushallituksen kansallinen tietovaranto |\n| **Asiakirjapohja / DocumentTemplate** | eVakan `document_template`-rivi, sapluuna josta luodaan asiakirjailmentymät |\n| **Asiakirjailmentymä / ChildDocument** | Lapselle kytketty täytetty asiakirja, eVakan `child_document`-rivi |\n| **Huoltajan polku** | Asiakirjan siirto perusopetukseen huoltajan hyväksynnällä (CITIZEN_BASIC-tyypin pohja) |\n| **Henkilökunnan polku** | Asiakirjan siirto perusopetukseen henkilökunnan päätöksellä (OTHER-tyypin pohja) |\n| **OPH OID / oppijanumero** | Opetushallituksen oppijanumero (Koski), esim. `1.2.246.562.24.XXX` |\n| **CITIZEN_BASIC / OTHER** | eVakan `ChildDocumentType`-enum-arvoja |\n| **MVP** | Minimum Viable Product — vaiheen 2 tuotantoon vietävä ensimmäinen versio |\n| **Tukipäätösten yhteenveto** | Rakenteinen tieto lapsen tukipäätöksistä eNivelessä; itse päätösasiakirja on Koskessa |\n| **mTLS** | Mutual TLS — kahdensuuntainen sertifikaattipohjainen autentikointi |\n| **RBAC** | Role-Based Access Control — roolipohjainen pääsynhallinta |\n| **DPA** | Data Processing Agreement — tietosuoja-asetuksen mukainen käsittelysopimus |\n| **MPASSid** | Opetushallituksen kansallinen tunnistautumispalvelu opettajille ja oppilaille. Tarjoaa kirjautuneesta opettajasta oppijanumeron, nimen, oppilaitos-OID:n ja henkilökunta/oppilas-tiedon. Ei tarjoa sähköpostia, käyttäjätunnusta eikä luokka-/oppilastason oikeutusta. Lähde: [MPASSid 1.4 -tietomalli](https://wiki.eduuni.fi/spaces/ophPPK/pages/313150371). |\n| **Entra ID** | Microsoftin pilvi-identity-palvelu (entinen Azure AD). Turun ja Oulun kuntien rehtorit ja pääkäyttäjät tunnistetaan kunnan Entra ID:n (`turku.fi` / `ouka.fi`) kautta. |\n| **edu-AD** | Kuntien koulutusverkon AD-järjestelmät (`edu.turku.fi`, `edu.ouka.fi`), joissa opettajien käyttäjätunnukset. Vaihtoehtoinen tunnistautumistapa MPASSidille opettajien osalta — ei MVP:ssä. |\n| **OneRoster** | 1EdTech:n (entinen IMS Global) K-12-maailman standardi opettaja↔luokka↔oppilas-tietojen siirtoon. REST/JSON + OAuth 2.0 Client Credentials. DigiOne tukee OneRosteria, mutta vain opetusryhmille — ei suomalaisen peruskoulun valvontaryhmille. |\n| **IdM-API** | DigiOnen `bulkapis`-mikropalvelun rajapinta oppijoiden ja henkilöstön tiedoille (`GET /users`, XML-vastaus). Vaatii Login-API:n Bearer-tokenin + mTLS-sertifikaatin tuotannonkaltaisissa ajoympäristöissä. Litterointi: `/Volumes/Evaka/enivel/IdM-API/README.md`. |\n| **OPH-koodistot** | Opetushallituksen koodistopalvelussa ylläpidetyt URI-pohjaiset luokitukset (esim. `opiskeluoikeudentyyppi_perusopetus`, `perusopetuksenluokkaaste_4`). Yhteinen luokitusjärjestelmä eVakan, eNivelen, DigiOnen IdM-API:n ja Koski-tietovarannon välillä. |\n| **Valvontaryhmä** | Suomalaisen peruskoulun pysyvä oppilasryhmä (esim. *1A*), jolle on määrätty luokanvalvoja. Eri käsite kuin \"opetusryhmä\" (matikan ryhmä jne.) — OneRoster-standardin `classes` vastaa opetusryhmää, ei valvontaryhmää. |\n";
  const renderer = new marked.Renderer();
  const origCode = renderer.code.bind(renderer);
  renderer.code = function(code, lang) {
    if (lang === 'mermaid') {
      return '<div class="mermaid">' + code + '</div>';
    }
    return origCode(code, lang);
  };
  const expanded = md.replace(/<!-- PAGEBREAK -->/g, '\n\n<hr class="pagebreak" />\n\n');
  marked.setOptions({ gfm: true, breaks: false });
  document.getElementById('content').innerHTML = marked.parse(expanded, { renderer });
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
  });
  mermaid.run({ querySelector: '.mermaid' }).then(() => {
    window.__renderingDone = true;
  }).catch(e => {
    console.error('mermaid error:', e);
    window.__renderingDone = true;
  });
</script>
