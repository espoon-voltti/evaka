<script>
  const md = "# Liite B — Käyttöliittymäluonnokset ja muut artefaktit\n\nTämä liite kokoaa pää-määrittelyn rinnalla toimitettavat artefaktit, jotka eivät ole markdown-/PDF-muotoon luontevasti taipuvia: Figma-mockupit eNivelen omasta käyttöliittymästä sekä Miro-board prosessikuvauksineen.\n\n## B.1 eNivelen UI — Figma-mockupit\n\n**Figma-tiedosto:** [eNivelen UI-mockup](https://www.figma.com/design/rLgCeZ2ULBoQJ0D1wZdeGZ/) (tiedoston id `rLgCeZ2ULBoQJ0D1wZdeGZ`)\n\nMockup sisältää eNivelen oman web-käyttöliittymän kaksi keskeisintä näkymää:\n\n### B.1.1 Frame 57 — Lapsen detail-näkymä\n\n**Figma-frame:** `55:2965` ([avaa Figmassa](https://www.figma.com/design/rLgCeZ2ULBoQJ0D1wZdeGZ?node-id=55-2965))\n\nYksittäisen oppilaan kokonaiskuvanäkymä, johon perusopetuksen henkilökunta päätyy klikatessaan lapsen nimeä lasten listalta. Näkymä on määritelty pää-spec luvussa 4 (UC-5: Oppilaan tietojen tarkastelu eNivelessä).\n\n**Frame 57:n sisältölohkot** (pää-spec:n vaatimusten mukaisesti):\n\n| Lohko | Sisältö | Pää-spec-viittaus |\n|---|---|---|\n| Otsikkorivi | Lapsen nimi, oppijanumero, syntymäaika | 3.3.1 Oppilas |\n| Esiopetussijoitus | Yksikkö, ryhmä, ajanjakso | 3.3.3, 3.3.4 |\n| Perusopetussijoitus | Koulu, luokka (sis. mahdollisen koulupaikkapäätöksen muutos-painike) | 3.3.10 + UC-6 |\n| Tuen tiedot rakenteisena | Tuen taso, ajanjaksot, tukitoimet, vapaa arvio | 3.3.5, 3.3.6 |\n| Asiakirjat | Lista huoltajan polun ja henkilökunnan polun ilmentymistä, klikattavissa | UC-5 vaihe 5 |\n| Tukipäätösten yhteenveto | Lukumäärä per päätöstyyppi, päivämäärät | 3.3.7, UC-4 |\n| Tapahtumaloki | Aikajärjestyksessä siirrot, päivitykset, koulusijoituspäätös jne. | UC-5 vaihe 5 |\n\n### B.1.2 Frame 59 — Lasten lista\n\n**Figma-frame:** `55:3457` ([avaa Figmassa](https://www.figma.com/design/rLgCeZ2ULBoQJ0D1wZdeGZ?node-id=55-3457))\n\nPäänäkymä jossa käyttäjä näkee oman luvituksensa rajoissa olevat oppilaat suodattimien kanssa. Näkymä määritelty UC-5:ssä ja UR-3:ssa (lasten lista lukumäärät suodatinryhmittäin).\n\n**Frame 59:n sisältölohkot:**\n\n| Lohko | Sisältö | Pää-spec-viittaus |\n|---|---|---|\n| Yläpalkki | Käyttäjähallinta-linkki (pääkäyttäjille ja rehtoreille), kirjautuneen käyttäjän nimi, \"Tiedot poistuvat ‹pvm›\" -teksti | 2.4.5, UR-4 |\n| Suodatinpalkki | Kaikki / Tukea saavat / Ei dokumentteja / Koulupaikka päätetty / Koulupaikka puuttuu / Erityiskouluun sijoitettu — sisältää lukumäärät | UR-3 |\n| Hakukenttä | Nimi, oppijanumero, hetu | UC-5 vaihe 3 |\n| Taulukko-näkymä | Nimi, syntymäaika, esiopetusyksikkö, koulupaikka, tuen tarve -indikaattori, asiakirjojen tila | UC-5 vaihe 2 |\n| Toimintopainikkeet | \"Lisää koulupaikkatietoja\" (CSV-tuonti), \"Lähetä palautetta\" | UC-6, 6.7.4 |\n| Alaviite | Tietosuojaseloste-linkki | 6.1.5 |\n\n### B.1.3 Pääsy mockupeihin\n\nTilaajan ja vaiheen 2 toimittajien pääsy Figma-tiedostoon järjestetään tarvittaessa erikseen. Reaktorin yhteyshenkilöt ovat Markus Lappalainen ja Jonni Madekivi.\n\n## B.2 Miro-board — prosessikuvaukset ja sidosryhmämateriaali\n\n**Miro-board:** [nivelvaihe copy](https://miro.com/app/board/uXjVHWGnQJg=/) (board-id `uXjVHWGnQJg=`)\n\nSisältää hankkeen alusta lähtien kerätyt materiaalit, jotka muodostavat pohjan pää-spec:n käyttötapauksille ja arkkitehtuurivalinnoille:\n\n| Osio | Sisältö |\n|---|---|\n| Kickoff-materiaalit | Hankkeen tavoitteet, sidosryhmät, työpaja-ajat |\n| Sidosryhmäkartta | Turun ja Oulun yhteyshenkilöt, Reaktorin tiimi, ulkoiset asiantuntijat |\n| Käyttäjätarinat | Ennen pää-spec:n UC-rakennetta kerätyt vapaamuotoiset tarinat |\n| Käyttötapaukset (luonnos) | Ennen UC-numerointia jaoteltuja tapauksia, joista pää-spec:n UC-1...UC-10 johdettu |\n| Kysymykset (35 stickyä) | Avoimet asiat, joista osa vastattu pää-spec:n 5.5.1:ssä (Tieran tapaaminen) |\n| Tietomallin luonnos | Pohjarakenne pää-spec:n luvulle 3 |\n| Sequence-diagrammi | eVaka → eNivel → DigiOne -tiedonsiirron yksinkertaistettu sekvenssi |\n| Työpaja 14.4.2026 -valmistelut | Asiantuntijahaastattelujen muistiinpanot |\n\n### B.2.1 Pääsy Miroon\n\nMiron board on jaettu hankkeen ydintiimille (Turku + Oulu + Reaktor). Vaiheen 2 toimittajille jakelusta sovitaan tilaajan kanssa erikseen.\n\n## B.3 Muut artefaktit (toimitettavat pää-paketin rinnalla)\n\n| Artefakti | Sijainti | Tarkoitus |\n|---|---|---|\n| `enivel-jarjestelmamaarittely-2026-05-28.pdf` | `/pdf/` repon juuressa | Pää-paketti, yhdistetty PDF |\n| Pää-spec lukukohtaisesti (01-johdanto…07-toteutus-nakokulmat) | `/pdf/` repon juuressa | Pää-paketin yksittäiset luvut |\n| `IdM-API/README.md` | Repon juuressa | DigiOnen IdM-API:n litterointi (Confluence-sivu kuvakaappauksina) |\n| `IdM-API-liittyvat-dokumentaatiot-nuolet.png` | `/pdf/` | Annotoitu Tieran Confluencen \"Liittyvät dokumentaatiot\" -lista — pyydettävät lisätiedot merkitty |\n| `tiera-tapaaminen-2026-06.pdf` | `/pdf/` | 28.5.2026 pidetyt esityskalvot Tieralle |\n| `OpenAPI-spesifikaatio` | Erillinen tiedosto, tuotetaan myöhemmin | Pää-spec luvun 5.6.1 mukaisesti vaiheen 2 tarjouspyynnön liitteenä |\n\n## B.4 Viittaukset pää-spec:iin\n\nTämän liitteen sisältö liittyy pää-spec-asiakirjan seuraaviin kohtiin:\n\n| Pää-spec | Liitteen B kohta |\n|---|---|\n| 1.4 Rajaukset (käyttäjätarinat ja käyttöliittymäluonnokset Figmassa) | B.1 |\n| 2.4.7 eNivelellä on oma käyttöliittymä | B.1 |\n| 4 Käyttötapaukset, kaikki UC:t | B.1.1, B.1.2 |\n| 4.4 Vaatimukset käyttäjäkokemukseen (UR-3, UR-4, UR-5) | B.1.2 |\n| 5.6.1 OpenAPI-spesifikaatio | B.3 |\n";
  const renderer = new marked.Renderer();
  const origCode = renderer.code.bind(renderer);
  renderer.code = function(code, lang) {
    if (lang === 'mermaid') return '<div class="mermaid">' + code + '</div>';
    return origCode(code, lang);
  };
  const expanded = md.replace(/<!-- PAGEBREAK -->/g, '\n\n<hr class="pagebreak" />\n\n');
  marked.setOptions({ gfm: true, breaks: false });
  document.getElementById('content').innerHTML = marked.parse(expanded, { renderer });
  mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  mermaid.run({ querySelector: '.mermaid' }).then(() => { window.__renderingDone = true; })
    .catch(e => { console.error('mermaid error:', e); window.__renderingDone = true; });
</script>
