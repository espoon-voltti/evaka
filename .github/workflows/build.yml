name: Build
on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      push:
        required: false
        default: 'true'
      playwright_tag:
        required: true
        default: 'master'


env:
  AWS_REGION: eu-north-1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write
  actions: read

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    steps:
      - name: "Cache bust"
        id: cache-bust
        run: echo "cache-bust=$(date '+%Y-%V')" >> "$GITHUB_OUTPUT"
    outputs:
      cache-bust: ${{ steps.cache-bust.outputs.cache-bust }}

  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: espoon-voltti/voltti-actions/shellcheck@v1

  check-licenses:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Reuse Compliance Check
      uses: fsfe/reuse-action@v6

  frontend-common:
    runs-on: ubuntu-latest
    needs:
      - cache-bust
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker building
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS: false

      - name: Build frontend image
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ghcr.io/espoon-voltti
          name: evaka/frontend-common
          path: ./frontend
          push: ${{ inputs.push || 'true' }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            SENTRY_PUBLISH_ENABLED=false
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}
            ICONS=free
          build-contexts:
            customizations=frontend/src/lib-customizations/espoo

      - name: Build frontend image builder
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: builder
        with:
          registry: ghcr.io/espoon-voltti
          name: evaka/frontend-common-builder
          cache_from: ${{ steps.build.outputs.image_cache }}
          path: ./frontend
          target: builder-single
          push: ${{ inputs.push || 'true' }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            SENTRY_PUBLISH_ENABLED=false
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}
            ICONS=free
          build-contexts:
            customizations=frontend/src/lib-customizations/espoo

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

    outputs:
      image: ${{ steps.build.outputs.image }}
      image_name: ${{ steps.build.outputs.image_name }}
      builder_image: ${{ steps.builder.outputs.image }}
      builder_image_name: ${{ steps.builder.outputs.image_name }}

  frontend:
    runs-on: ubuntu-latest
    needs:
      - cache-bust
    steps:
      - uses: actions/checkout@v6

      - name: Cache fortawesome
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: fortawesome
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: fortawesome-${{ hashFiles('frontend/unpack-pro-icons.sh') }}

      - name: Configure AWS credentials
        if: ${{ !github.event.pull_request.head.repo.fork && steps.fortawesome.outputs.cache-hit != 'true' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Install fortawesome
        if: ${{ !github.event.pull_request.head.repo.fork && steps.fortawesome.outputs.cache-hit != 'true' }}
        run: |
          aws s3 cp s3://evaka-assets/fontawesome-7.2.0/fortawesome-pro-light-svg-icons-7.2.0.tgz frontend/vendor/fortawesome/
          aws s3 cp s3://evaka-assets/fontawesome-7.2.0/fortawesome-pro-regular-svg-icons-7.2.0.tgz frontend/vendor/fortawesome/
          aws s3 cp s3://evaka-assets/fontawesome-7.2.0/fortawesome-pro-solid-svg-icons-7.2.0.tgz frontend/vendor/fortawesome/
          (cd frontend && ./unpack-pro-icons.sh)

      - name: Setup Docker building
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ROLE: ${{ secrets.AWS_ROLE }}

      - name: Build frontend image
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ${{ steps.setup.outputs.ecr_registry }}
          name: evaka/frontend
          path: ./frontend
          push: ${{ inputs.push || 'true' }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            SENTRY_PUBLISH_ENABLED=${{ github.ref_name == 'master' && 'true' || 'false' }}
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}
            ICONS=pro
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          build-contexts:
            customizations=frontend/src/lib-customizations/espoo

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

    outputs:
      image: ${{ steps.build.outputs.image }}
      image_name: ${{ steps.build.outputs.image_name }}

  frontend-test:
    needs:
      - frontend-common
      - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: docker run --rm "${{ needs.frontend-common.outputs.builder_image }}" yarn lint

      - name: Type check
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: docker run --rm "${{ needs.frontend-common.outputs.builder_image }}" yarn type-check

      - name: Test
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: docker run --rm "${{ needs.frontend-common.outputs.builder_image }}" yarn test --maxWorkers=2

      - name: Build and test fork
        id: fork
        if: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          cd ./frontend
          ./build-docker.sh test

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

  api-gateway:
    runs-on: ubuntu-latest
    needs:
      - cache-bust
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker building
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ROLE: ${{ secrets.AWS_ROLE }}

      - name: Build and run API-gateway tests
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: test
        with:
          registry: ${{ steps.setup.outputs.ecr_registry }}
          name: evaka/api-gateway-test
          path: ./apigw
          push: false
          load: true
          target: test
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Build API-gateway image
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ${{ steps.setup.outputs.ecr_registry }}
          name: evaka/api-gateway
          path: ./apigw
          push: ${{ inputs.push || 'true' }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Build docker tests and image on fork
        if: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          cd ./apigw
          ./build-docker.sh test
          ./build-docker.sh

    outputs:
      image: ${{ steps.build.outputs.image }}

  service:
    runs-on: ubuntu-latest
    needs:
      - cache-bust
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker building
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ROLE: ${{ secrets.AWS_ROLE }}

      - name: Build Evaka Service image
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ${{ steps.setup.outputs.ecr_registry }}
          name: evaka/service
          path: .
          dockerfile: service/Dockerfile
          push: ${{ inputs.push || 'true' }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Build Evaka Service builder image
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: builder
        with:
          registry: ${{ steps.setup.outputs.ecr_registry }}
          name: evaka/service-builder
          target: builder
          cache_from: ${{ steps.build.outputs.image_cache }}
          path: .
          dockerfile: service/Dockerfile
          push: ${{ inputs.push || 'true' }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

    outputs:
      image: ${{ steps.build.outputs.image }}
      image_name: ${{ steps.build.outputs.image_name }}
      builder_image: ${{ steps.builder.outputs.image }}
      builder_image_name: ${{ steps.builder.outputs.image_name }}

  service-test:
    needs:
      - cache-bust
      - service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker building
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ROLE: ${{ secrets.AWS_ROLE }}

      - name: Build and run Evaka Service tests
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ${{ steps.setup.outputs.ecr_registry }}
          name: evaka/service-test
          path: .
          dockerfile: service/test.Dockerfile
          push: false
          load: true
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.event.pull_request.head.sha || github.sha }}
            BASE_IMAGE=${{ needs.service.outputs.builder_image }}

      - name: Run service tests for fork
        if: ${{ github.event.pull_request.head.repo.fork }}
        shell: bash
        run: |
          cd ./service
          ./build-docker.sh test

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

  owasp:
    needs:
      - service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-duration-seconds: 1200

      - name: Login to Amazon ECR
        if: ${{ !github.event.pull_request.head.repo.fork }}
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Cache dependency check database
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: actions/cache@v5
        with:
          path: dependency-check-data
          key: dependency-check-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dependency-check-data-

      - name: Run service OWASP tests
        if: ${{ !github.event.pull_request.head.repo.fork }}
        shell: bash
        run: |
          docker run --rm \
              -e NVD_API_KEY=${{ secrets.NVD_API_KEY }} \
              -e OSS_INDEX_USERNAME=${{ secrets.OSS_INDEX_USERNAME }} -e OSS_INDEX_PASSWORD=${{ secrets.OSS_INDEX_PASSWORD }} \
              -v $(pwd)/dependency-check-data:/root/.gradle/dependency-check-data \
              ${{ needs.service.outputs.builder_image }} \
              sh -c "./gradlew --no-daemon dependencyCheckUpdate && ./gradlew --no-daemon dependencyCheckAnalyze"

  check-schema:
    needs:
      - service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start database
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: |
          cd compose
          docker compose up -d --wait db

      - name: Apply migrations
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          TAG: "${{ github.event.pull_request.head.sha || github.sha }}"
        run: |
          docker run --rm --network=host \
            "ghcr.io/espoon-voltti/evaka/service-builder:${TAG}" \
            ./gradlew --no-daemon -Dorg.gradle.configuration-cache=false flywayMigrate

      - name: Check schema documentation is up-to-date
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: |
          bin/dump-db-schema.sh > /tmp/schema.sql
          if ! diff -q docs/db/schema.sql /tmp/schema.sql > /dev/null 2>&1; then
            echo "::error::docs/db/schema.sql is out of date. Run 'mise dump-schema' to update it."
            diff -u docs/db/schema.sql /tmp/schema.sql || true
            exit 1
          fi

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

  service-integration-test:
    needs:
      - service
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_chunk_number: [1, 2, 3, 4, 5, 6]
        test_chunk_count: [6] # must max value of above list

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run service integration tests
        if: ${{ !github.event.pull_request.head.repo.fork }}
        shell: bash
        env:
          TAG: "${{ github.event.pull_request.head.sha || github.sha }}"
          BUILD: "false"
        run: |
          cd ./compose
          mkdir -p test-results/
          ./compose-integration pull
          args=$(../bin/split-integration-tests.sh "${{ matrix.test_chunk_number }}" "${{ matrix.test_chunk_count }}")
          echo "Running tests with args: $args"
          ./compose-integration run integration-test $args
          ./compose-integration logs db > test-results/db.log

      - name: Run service integration tests for fork
        if: ${{ github.event.pull_request.head.repo.fork }}
        shell: bash
        run: |
          cd ./compose
          args=$(../bin/split-integration-tests.sh "${{ matrix.test_chunk_number }}" "${{ matrix.test_chunk_count }}")
          echo "Running tests with args: $args"
          ./compose-integration run integration-test $args

      - name: Store test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results-${{ matrix.test_chunk_number }}
          path: |
            compose/test-results/
            !compose/test-results/**/binary/
          retention-days: 2

  municipality-smoke-test:
    needs:
      - service
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The service need option IDs are known IDs in municipalities' `afterMigrate_*` scripts
        include:
          - municipality: oulu
            service_need_option_id: de463972-9f97-11ec-a22c-931f5a294cea
          - municipality: turku
            service_need_option_id: 50358394-b961-11eb-b51f-67ac436e5636
          - municipality: tampere
            service_need_option_id: 0a58d934-6fd1-11ed-a75e-c353faef5857
          - municipality: hameenkyro
            service_need_option_id: 1183e6ec-00b3-45b3-a9b5-efd9d521946a
          - municipality: kangasala
            service_need_option_id: 000a9d54-dd88-4f71-8489-b7d29e49ae92
          - municipality: lempaala
            service_need_option_id: 15ec591b-9dc7-42da-8cae-1a01ac36c62f
          - municipality: nokia
            service_need_option_id: 0af77db8-61aa-4ffb-8019-d9a73886e793
          - municipality: orivesi
            service_need_option_id: 8d7334fa-76cf-4661-8a9a-d53f6b03a8c5
          - municipality: pirkkala
            service_need_option_id: 18a83b84-51e5-49a3-9bc7-52fd7563944a
          - municipality: vesilahti
            service_need_option_id: 3e49ca5f-7144-49d4-8184-ab96758ee969
          - municipality: ylojarvi
            service_need_option_id: 19eb58c9-e8f6-42f4-a635-4c84a3e08d77

    if: ${{ !github.event.pull_request.head.repo.fork }}

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start service with ${{ matrix.municipality }} config
        env:
          TAG: "${{ github.event.pull_request.head.sha || github.sha }}"
          BUILD: "false"
        run: |
          cd compose
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml run -d \
            -e EVAKA_MUNICIPALITY=${{ matrix.municipality }} \
            -p 8888:8888 \
            --name evaka-srv \
            evaka-srv

      - name: Wait for service to be healthy
        run: |
          TRIES=60
          while [ $TRIES -gt 0 ]; do
            RESPONSE=$(curl -sS --connect-timeout 3 --max-time 5 http://localhost:8888/health 2>/dev/null || echo "")
            STATUS=$(echo "$RESPONSE" | jq -r '.status' 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "Service is healthy: $RESPONSE"
              break
            fi
            echo "Got '$RESPONSE' - retrying ($TRIES left) ..."
            sleep 5
            TRIES=$((TRIES - 1))
          done
          if [ $TRIES -eq 0 ]; then
            echo "::error::Service failed to start with ${{ matrix.municipality }} config"
            docker logs evaka-srv
            exit 1
          fi

      - name: Verify afterMigrate scripts ran
        run: |
          cd compose
          result=$(docker compose -f docker-compose.yml exec -T db \
            psql -U postgres -d evaka_local -tAc \
            "SELECT count(*) FROM service_need_option WHERE id = '${{ matrix.service_need_option_id }}'")
          if [ "$result" != "1" ]; then
            echo "::error::Expected service_need_option ${{ matrix.service_need_option_id }} to exist for ${{ matrix.municipality }}, but count=$result"
            exit 1
          fi
          echo "afterMigrate scripts ran successfully for ${{ matrix.municipality }}"

      - name: Docker cleanup
        if: always()
        uses: espoon-voltti/voltti-actions/docker-cleanup@master

  e2e:
    needs:
      - service
      - api-gateway
      - frontend-common
      - frontend
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    env:
      PLAYWRIGHT_TAG: "${{ inputs.playwright_tag || 'master' }}"
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Playwright e2e tests
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          TAG: "${{ github.event.pull_request.head.sha || github.sha }}"
          BUILD: "false"
          FRONTEND_IMAGE: "ghcr.io/espoon-voltti/evaka/frontend"
          SHARD: "${{ matrix.shard }}"
          SHARD_TOTAL: "6"
        run: |
          set -eo pipefail
          cd ./compose
          ./test-e2e pull
          ./test-e2e run playwright | tee e2e.log

      - name: Run Playwright e2e tests for fork
        if: ${{ github.event.pull_request.head.repo.fork }}
        env:
          SHARD: "${{ matrix.shard }}"
          SHARD_TOTAL: "6"
        run: |
          set -eo pipefail
          cd ./compose
          ./test-e2e run playwright | tee e2e.log

      - name: Get logs
        if: always()
        run: |
          cd compose
          ./test-e2e logs > e2e-all.log

      - name: Store test results and logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-${{ matrix.shard }}
          path: |
            frontend/test-results/
            frontend/traces/
            compose/e2e.log
            compose/e2e-all.log
          retention-days: 2

  frontend-s3:
    if: ${{ github.ref == 'refs/heads/master' && !github.event.pull_request.head.repo.fork && inputs.push != 'false' }}
    needs:
      - frontend
      - frontend-test
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-duration-seconds: 1200

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Extract frontend files
        run: |
          rm -rf ./frontend-build/
          docker create -ti --name frontend_instance "${{ needs.frontend.outputs.image }}" sh
          docker cp frontend_instance:/static/espoo/. ./frontend-build/
          docker rm -f frontend_instance

      - name: Configure AWS credentials
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-duration-seconds: 1200

      - name: Clean build from non-versioned files
        run: |
          cd ./frontend-build/
          for filename in index.html service-worker.js service-worker.js.map; do
            find . -name "$filename" -not -path "./maintenance-page/*" -type f -delete
          done

          aws s3 sync --exact-timestamps . s3://${{ secrets.STATIC_FALLBACK_BUCKET }}/

  tag:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    needs:
      - service-test
      - service-integration-test
      - municipality-smoke-test
      - e2e
      - frontend-test
      - lint-shell
      - check-licenses
      - check-schema
    steps:
      - name: Configure AWS credentials
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-duration-seconds: 1200

      - name: Login to GitHub Container Registry
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata # Used to get the tag from DOCKER_METADATA_OUTPUT_VERSION
        id: metadata
        env:
          DOCKER_METADATA_PR_HEAD_SHA: "true"
        uses: docker/metadata-action@v6
        with:
          images: |
            evaka/dummy
          tags: |
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch,prefix=

      - name: Retag with branch
        run: |
          if test -z "$DOCKER_METADATA_OUTPUT_VERSION"; then
            echo "Empty tag"
            exit 1
          fi

          for repository in evaka/frontend evaka/frontend-common evaka/frontend-common-builder evaka/service evaka/service-builder evaka/api-gateway; do
            ghcr_image_base="ghcr.io/espoon-voltti/${repository}"
            ghcr_image="${ghcr_image_base}:${{ github.event.pull_request.head.sha || github.sha }}"
            ghcr_target="${ghcr_image_base}:${DOCKER_METADATA_OUTPUT_VERSION}"
            echo "Tagging GHCR with '${ghcr_target}'"
            docker pull "$ghcr_image"
            docker tag "$ghcr_image" "${ghcr_image_base}:${DOCKER_METADATA_OUTPUT_VERSION}"
            docker push "${ghcr_image_base}:${DOCKER_METADATA_OUTPUT_VERSION}"
          done

          for repository in evaka/frontend evaka/service evaka/service-builder evaka/api-gateway; do
            # ECR retag
            MANIFEST=$(aws ecr batch-get-image --repository-name "$repository" --image-ids imageTag="${{ github.event.pull_request.head.sha || github.sha }}" --output json | jq --raw-output --join-output '.images[0].imageManifest')
            aws ecr put-image --repository-name "$repository" --image-tag "${DOCKER_METADATA_OUTPUT_VERSION}" --image-manifest "$MANIFEST"
          done

  notify:
    if: ${{ always() && contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    needs:
      - tag
      - frontend-s3
    steps:
      - name: Report failure
        uses: espoon-voltti/voltti-actions/notify@master
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          channel: "#evaka-alerts"
          message: "CI job for master branch failed"
